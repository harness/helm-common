fail_fast: false

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.0.1
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
- repo: https://github.com/gruntwork-io/pre-commit
  rev: v0.1.17
  hooks:
  - id: helmlint
# Run library test suite (template smoke + helm-unittest) so failures are caught before push
- repo: local
  hooks:
  - id: helm-common-tests
    name: helm-common library tests
    entry: bash -c './ci/run-tests.sh'
    language: system
    pass_filenames: false
