# Minimal base values so library templates never see nil (e.g. global.pdb.create).
# CI overlays with ci-values/*.yaml to enable one feature per scenario.
global:
  pdb:
    create: false
  autoscaling:
    enabled: false
  keda:
    enabled: false
  ingress:
    enabled: false
    className: ""
    hosts: []
    compatibilityHosts: []
    pathType: ImplementationSpecific
    disableHostInIngress: false
    objects: {}
    tls:
      enabled: false
      secretName: ""
  istio:
    enabled: false
    virtualService:
      hosts: []
      gateways: []
    gateway:
      create: false
      namespace: istio-system
      name: public
# Top-level keys used by library (avoid nil when template runs)
pdb:
  create: false
autoscaling:
  enabled: false
keda:
  enabled: false
  scaledObject:
    triggers: []  # required when enabled; empty so template never sees nil
  triggerAuthentication:
    create: false
ingress:
  objects: []
  extraHosts: []
virtualService:
  objects: []
service:
  port: 80
