# Scenario: Ingress enabled (smoke test for harnesscommon.v1.renderIngress)
global:
  ingress:
    enabled: true
    className: "nginx"
    hosts:
      - "test.example.com"
    objects: {}  # optional annotations; must exist to avoid nil in template
ingress:
  objects:
    - paths:
        - path: /
          pathType: Prefix
