suite: KEDA TriggerAuthentication
values:
  - ../values.yaml
  - ../ci-values/keda.yaml
templates:
  - keda-trigger-auth.yaml
release:
  name: harness-common-test
  namespace: default
tests:
  - it: should render one TriggerAuthentication when keda triggerAuthentication create
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: TriggerAuthentication
      - equal:
          path: metadata.name
          value: test-prometheus-auth
      - equal:
          path: spec.podIdentity.provider
          value: gcp
