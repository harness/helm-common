# Validate harness-common library: lint + template smoke tests on every PR and push.
name: Test library

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.9.2
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0
      - name: Lint library chart
        working-directory: ./src/common
        run: |
          ct lint --target-branch=develop --charts=. \
            --chart-repos=harness-common=https://harness.github.io/helm-common/charts,common=https://charts.bitnami.com/bitnami \
            --validate-maintainers=false

  template-smoke:
    name: Template smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.9.2
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest
      - name: Run template smoke tests and helm-unittest
        run: ./ci/run-tests.sh
